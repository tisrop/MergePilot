name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Verify release tag matches manifests
        run: node .github/checks/version-consistency.mjs --tag "$GITHUB_REF_NAME"

      - name: Verify updater security configuration
        run: node .github/checks/updater-config.mjs

  prepare-release:
    needs: version-consistency
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.release.outputs.release-id }}
      release-upload-url: ${{ steps.release.outputs.release-upload-url }}
    steps:
      - name: Create or update draft release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            --jq '.body')"
          if [ -z "$BODY" ]; then
            BODY="MergeBeacon ${GITHUB_REF_NAME}"
          fi

          gh api --paginate "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            | jq -s 'add' > "$RUNNER_TEMP/releases.json"
          MATCH_COUNT="$(jq --arg tag "$GITHUB_REF_NAME" \
            '[.[] | select(.tag_name == $tag)] | length' "$RUNNER_TEMP/releases.json")"
          if [ "$MATCH_COUNT" -gt 1 ]; then
            echo "同一 Tag 存在多个 Release，无法安全更新：${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          RELEASE_ID="$(jq -r --arg tag "$GITHUB_REF_NAME" \
            '.[] | select(.tag_name == $tag) | .id' "$RUNNER_TEMP/releases.json")"
          if [ -n "$RELEASE_ID" ]; then
            IS_DRAFT="$(jq -r --arg tag "$GITHUB_REF_NAME" \
              '.[] | select(.tag_name == $tag) | .draft' "$RUNNER_TEMP/releases.json")"
            if [ "$IS_DRAFT" != "true" ]; then
              echo "Release 已发布，拒绝覆盖：${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            gh api --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
              -f name="MergeBeacon ${GITHUB_REF_NAME}" \
              -f body="$BODY" \
              -F draft=true \
              -F prerelease=false > "$RUNNER_TEMP/release.json"
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="${GITHUB_REF_NAME}" \
              -f name="MergeBeacon ${GITHUB_REF_NAME}" \
              -f body="$BODY" \
              -F draft=true \
              -F prerelease=false > "$RUNNER_TEMP/release.json"
            RELEASE_ID="$(jq -r '.id' "$RUNNER_TEMP/release.json")"
          fi

          if ! [[ "$RELEASE_ID" =~ ^[0-9]+$ ]]; then
            echo "Draft Release ID 无效：${RELEASE_ID}" >&2
            exit 1
          fi
          RELEASE_UPLOAD_URL="$(jq -r '.upload_url // ""' "$RUNNER_TEMP/release.json")"
          if [[ "$RELEASE_UPLOAD_URL" != https://*"{?name,label}" ]]; then
            echo "Draft Release upload URL 无效" >&2
            exit 1
          fi
          echo "release-id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "release-upload-url=${RELEASE_UPLOAD_URL}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare-release
    permissions:
      contents: write
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            updater-platform: darwin-aarch64
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            updater-platform: darwin-x86_64
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            updater-platform: linux-x86_64
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            updater-platform: windows-x86_64
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Compute Rust dependency hash
        id: deps-hash
        shell: bash
        run: |
          {
            find . -name Cargo.toml -not -path './target/*' -print0 \
              | sort -z \
              | xargs -0 sed -E '/^version = /d'
            grep -v '^version = ' src-tauri/Cargo.lock
          } | sha256sum | cut -d' ' -f1 | {
            read -r hash
            echo "hash=${hash:0:20}" >> "$GITHUB_OUTPUT"
          }

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.target }}-${{ steps.deps-hash.outputs.hash }}
          add-rust-environment-hash-key: false
          cache-on-failure: true

      - name: Install Apple certificate (macOS)
        if: startsWith(matrix.platform, 'macos') && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Install dependencies (ubuntu)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Require updater signing secrets
        shell: bash
        env:
          UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_BASE64 }}
          UPDATER_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$UPDATER_KEY" ] || [ -z "$UPDATER_PASSWORD" ]; then
            echo "Updater signing secrets are required" >&2
            exit 1
          fi

      - name: Setup Tauri signing key
        shell: bash
        env:
          UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_BASE64 }}
          UPDATER_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077

          # `tauri signer generate` already writes the private key as the Base64
          # string expected by Tauri. The secret must be the exact `.key` file
          # contents and must not be Base64-encoded again.
          ENCODED_KEY=$(printf '%s' "$UPDATER_KEY" | tr -d '\r\n')
          DECODED_KEY="$RUNNER_TEMP/updater-key.decoded"

          if ! printf '%s' "$ENCODED_KEY" | base64 --decode > "$DECODED_KEY"; then
            echo "Updater signing key is not valid Tauri key data" >&2
            exit 1
          fi

          COMMENT=$(sed -n '1p' "$DECODED_KEY")
          ENCODED_LINE=$(sed -n '2p' "$DECODED_KEY")
          if [[ "$COMMENT" != "untrusted comment:"* ]] \
            || [[ "$COMMENT" != *"secret key"* ]] \
            || [[ -z "$ENCODED_LINE" ]] \
            || ! printf '%s' "$ENCODED_LINE" | base64 --decode >/dev/null 2>&1; then
            echo "Updater signing key must be the exact contents of the Tauri-generated .key file" >&2
            exit 1
          fi

          echo "::add-mask::$ENCODED_KEY"
          printf 'TAURI_SIGNING_PRIVATE_KEY=%s\n' "$ENCODED_KEY" >> "$GITHUB_ENV"

          PASSWORD_DELIMITER="TAURI_PASSWORD_$(date +%s%N)"
          {
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<$PASSWORD_DELIMITER"
            printf '%s\n' "$UPDATER_PASSWORD"
            echo "$PASSWORD_DELIMITER"
          } >> "$GITHUB_ENV"

      - run: npm ci

      - name: Verify updater signing key
        shell: bash
        run: |
          printf 'MergeBeacon updater signing preflight' > "$RUNNER_TEMP/updater-signing-preflight"
          npm run tauri -- signer sign "$RUNNER_TEMP/updater-signing-preflight"

      - name: Configure Apple signing env vars (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$SIGNING_IDENTITY" ]; then
            echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          else
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          fi
          if [ -n "$APPLE_ID_SECRET" ] && [ -n "$APPLE_PASSWORD_SECRET" ] && [ -n "$APPLE_TEAM_ID_SECRET" ]; then
            echo "APPLE_ID=$APPLE_ID_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release-id }}
          uploadUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Create portable executable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/mergebeacon.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "$exe not found"
            exit 1
          }
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $portableName = "MergeBeacon_${version}_x64-portable.exe"
          $tmpDir = $env:RUNNER_TEMP
          Copy-Item $exe "$tmpDir/$portableName"
          npm run tauri -- signer sign "$tmpDir/$portableName"
          if (-not (Test-Path "$tmpDir/$portableName.sig")) {
            Write-Error "Portable executable signature not found"
            exit 1
          }
          "PORTABLE_EXE=$tmpDir/$portableName" >> $env:GITHUB_ENV
          Write-Host "Created $portableName"

      - name: Create updater metadata fragment
        shell: bash
        env:
          TAURI_ARTIFACT_PATHS: ${{ steps.tauri-build.outputs.artifactPaths }}
        run: |
          mkdir -p updater-fragment
          node .github/checks/updater-metadata.mjs fragment \
            --platform "${{ matrix.updater-platform }}" \
            --config src-tauri/tauri.conf.json \
            --output "updater-fragment/${{ matrix.updater-platform }}.json"

      - name: Upload updater metadata fragment
        uses: actions/upload-artifact@v7
        with:
          name: updater-fragment-${{ matrix.updater-platform }}
          path: updater-fragment/*.json
          if-no-files-found: error
          retention-days: 1

      - name: Upload portable executable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare-release.outputs.release-id }}
          RELEASE_UPLOAD_URL: ${{ needs.prepare-release.outputs.release-upload-url }}
        run: |
          $assetName = [System.IO.Path]::GetFileName($env:PORTABLE_EXE)
          $assets = @(
            gh api "repos/$env:GITHUB_REPOSITORY/releases/$env:RELEASE_ID/assets?per_page=100" |
              ConvertFrom-Json |
              Where-Object { $_.name -eq $assetName }
          )
          if ($assets.Count -gt 1) {
            Write-Error "Duplicate portable assets found: $assetName"
            exit 1
          }
          if ($assets.Count -eq 1) {
            gh api --method DELETE "repos/$env:GITHUB_REPOSITORY/releases/assets/$($assets[0].id)"
          }

          $uploadBase = $env:RELEASE_UPLOAD_URL -replace '\{\?name,label\}$', ''
          $encodedName = [Uri]::EscapeDataString($assetName)
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          Invoke-RestMethod `
            -Method Post `
            -Uri "${uploadBase}?name=$encodedName" `
            -Headers $headers `
            -ContentType "application/octet-stream" `
            -InFile $env:PORTABLE_EXE

  assemble-updater-metadata:
    needs: [prepare-release, build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Download updater metadata fragments
        uses: actions/download-artifact@v8
        with:
          pattern: updater-fragment-*
          path: updater-fragments
          merge-multiple: true

      - name: Fetch draft release data
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare-release.outputs.release-id }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            > "$RUNNER_TEMP/release.json"
          jq -r '.body // ""' "$RUNNER_TEMP/release.json" \
            > "$RUNNER_TEMP/release-notes.txt"
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?per_page=100" \
            | jq -s 'add' > "$RUNNER_TEMP/release-assets.json"

      - name: Assemble updater metadata
        shell: bash
        run: |
          node .github/checks/updater-metadata.mjs assemble \
            --fragments updater-fragments \
            --assets "$RUNNER_TEMP/release-assets.json" \
            --notes "$RUNNER_TEMP/release-notes.txt" \
            --version "${GITHUB_REF_NAME#v}" \
            --asset-download-url-prefix \
              "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            --output "$RUNNER_TEMP/latest.json"

      - name: Upload updater metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" "${RUNNER_TEMP}/latest.json" --repo "${GITHUB_REPOSITORY}" --clobber

  cleanup-release-signatures:
    needs: assemble-updater-metadata
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Remove standalone updater signature assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mapfile -t SIG_ASSETS < <(
            gh release view "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json assets \
              --jq '.assets[].name | select(endswith(".sig"))'
          )

          if [ "${#SIG_ASSETS[@]}" -eq 0 ]; then
            echo "No standalone .sig release assets found."
            exit 0
          fi

          for ASSET in "${SIG_ASSETS[@]}"; do
            echo "Deleting release asset: ${ASSET}"
            gh release delete-asset "${GITHUB_REF_NAME}" "${ASSET}" \
              --repo "${GITHUB_REPOSITORY}" \
              --yes
          done

  publish:
    needs: [cleanup-release-signatures]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --repo ${{ github.repository }} --draft=false
