name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Verify release tag matches manifests
        run: node .github/checks/version-consistency.mjs --tag "$GITHUB_REF_NAME"

  build:
    needs: version-consistency
    permissions:
      contents: write
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
    strategy:
      # tauri-action updates latest.json with read-modify-write semantics. Serializing
      # matrix jobs prevents concurrent jobs from dropping another platform entry.
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Compute Rust dependency hash
        id: deps-hash
        shell: bash
        run: |
          {
            find . -name Cargo.toml -not -path './target/*' -print0 \
              | sort -z \
              | xargs -0 sed -E '/^version = /d'
            grep -v '^version = ' src-tauri/Cargo.lock
          } | sha256sum | cut -d' ' -f1 | {
            read -r hash
            echo "hash=${hash:0:20}" >> "$GITHUB_OUTPUT"
          }

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.target }}-${{ steps.deps-hash.outputs.hash }}
          add-rust-environment-hash-key: false
          cache-on-failure: true

      - name: Install Apple certificate (macOS)
        if: startsWith(matrix.platform, 'macos') && env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Install dependencies (ubuntu)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Require updater signing secrets
        shell: bash
        env:
          UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_BASE64 }}
          UPDATER_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$UPDATER_KEY" ] || [ -z "$UPDATER_PASSWORD" ]; then
            echo "Updater signing secrets are required" >&2
            exit 1
          fi

      - name: Setup Tauri signing key
        shell: bash
        env:
          UPDATER_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_BASE64 }}
          UPDATER_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          printf '%s' "$UPDATER_KEY" | base64 --decode > "$RUNNER_TEMP/updater.key"
          KEY_B64=$(base64 < "$RUNNER_TEMP/updater.key" | tr -d '\r\n')
          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_B64" >> "$GITHUB_ENV"

          PASSWORD_DELIMITER="TAURI_PASSWORD_$(date +%s%N)"
          {
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<$PASSWORD_DELIMITER"
            printf '%s\n' "$UPDATER_PASSWORD"
            echo "$PASSWORD_DELIMITER"
          } >> "$GITHUB_ENV"

      - name: Generate release notes
        id: release-notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            --jq '.body')"
          if [ -z "$BODY" ]; then
            BODY="MergePilot ${GITHUB_REF_NAME}"
          fi
          DELIM="RELEASE_NOTES_$(date +%s%N)"
          {
            echo "body<<$DELIM"
            printf '%s\n' "$BODY"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - run: npm ci

      - name: Configure Apple signing env vars (macOS)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$SIGNING_IDENTITY" ]; then
            echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
          else
            echo "APPLE_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          fi
          if [ -n "$APPLE_ID_SECRET" ] && [ -n "$APPLE_PASSWORD_SECRET" ] && [ -n "$APPLE_TEAM_ID_SECRET" ]; then
            echo "APPLE_ID=$APPLE_ID_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD_SECRET" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET" >> "$GITHUB_ENV"
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MergePilot ${{ github.ref_name }}'
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Create portable zip (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/mergepilot.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "$exe not found"
            exit 1
          }
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $zipName = "MergePilot_${version}_x64-portable.zip"
          $tmpDir = $env:RUNNER_TEMP
          Copy-Item $exe "$tmpDir/MergePilot.exe"
          Compress-Archive -Path "$tmpDir/MergePilot.exe" -DestinationPath "$tmpDir/$zipName"
          "PORTABLE_ZIP=$tmpDir/$zipName" >> $env:GITHUB_ENV
          Write-Host "Created $zipName"

      - name: Upload portable zip (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$env:GITHUB_REF_NAME" "$env:PORTABLE_ZIP" --repo "$env:GITHUB_REPOSITORY"

  validate-updater-metadata:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download updater metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern latest.json --dir "${RUNNER_TEMP}"

      - name: Validate updater metadata coverage
        shell: bash
        run: |
          METADATA="${RUNNER_TEMP}/latest.json"
          EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
          ASSET_URL_PREFIX="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/assets/"
          jq -e --arg version "$EXPECTED_VERSION" '
            type == "object"
              and .version == $version
              and (.notes | type == "string")
              and (.pub_date | type == "string" and length > 0)
              and (.platforms | type == "object")
          ' "$METADATA" >/dev/null

          for TARGET in darwin-aarch64 darwin-x86_64 linux-x86_64 windows-x86_64; do
            jq -e --arg target "$TARGET" --arg url_prefix "$ASSET_URL_PREFIX" '
              .platforms[$target]
              | type == "object"
                and (.signature | type == "string" and length > 0)
                and (.url | type == "string" and startswith($url_prefix))
            ' "$METADATA" >/dev/null || {
              echo "latest.json 缺少有效平台条目：${TARGET}" >&2
              exit 1
            }
          done

  cleanup-release-signatures:
    needs: validate-updater-metadata
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Remove standalone updater signature assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mapfile -t SIG_ASSETS < <(
            gh release view "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json assets \
              --jq '.assets[].name | select(endswith(".sig"))'
          )

          if [ "${#SIG_ASSETS[@]}" -eq 0 ]; then
            echo "No standalone .sig release assets found."
            exit 0
          fi

          for ASSET in "${SIG_ASSETS[@]}"; do
            echo "Deleting release asset: ${ASSET}"
            gh release delete-asset "${GITHUB_REF_NAME}" "${ASSET}" \
              --repo "${GITHUB_REPOSITORY}" \
              --yes
          done

  publish:
    needs: [cleanup-release-signatures]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --repo ${{ github.repository }} --draft=false
