name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C debuginfo=line-tables-only

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check application versions
        run: node .github/checks/version-consistency.mjs

      - name: Check updater security configuration
        run: node .github/checks/updater-config.mjs

      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Frontend standards
        run: npm run check:frontend-standards

      - name: Format check (oxfmt)
        run: npm run format

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  rust-fmt-clippy:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup || true
          docker system prune -af || true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ci-rust-fmt-clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  rust-test:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/.ghcup || true
          docker system prune -af || true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ci-rust-test

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test --all

      - name: Cancel workflow on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run cancel ${{ github.run_id }}

  rust:
    needs: [changes, rust-fmt-clippy, rust-test]
    if: always() && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check Rust jobs
        run: |
          if [ "${{ needs.rust-fmt-clippy.result }}" != "success" ]; then
            echo "rust-fmt-clippy result: ${{ needs.rust-fmt-clippy.result }}"
            exit 1
          fi
          if [ "${{ needs.rust-test.result }}" != "success" ]; then
            echo "rust-test result: ${{ needs.rust-test.result }}"
            exit 1
          fi

  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed areas
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - '.github/checks/frontend-standards.mjs'
              - '*.json'
              - 'AGENTS.md'
              - 'CODE_STANDARDS.md'
              - 'FRONTEND_STANDARDS.md'
              - '.oxlintrc*'
              - '.oxfmtrc*'
              - '.github/workflows/ci.yml'
            rust:
              - 'src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain*'
              - '.github/workflows/ci.yml'
