name: "🐞 Bug Report / 问题反馈"
description: Crashes, connection failures, merge errors, display bugs, or other reproducible issues. / 程序崩溃、连接失败、合并异常、界面显示错误或其他可复现问题。
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。涉及敏感信息请脱敏。请尽量提供复现步骤、截图和错误日志。
        MergeBeacon 版本、运行环境、操作系统和系统架构可在应用内查看。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请按下面的清单逐项填写，截图和错误日志尤其重要。
      placeholder: |
        1. 复现步骤：打开应用 → 选择仓库 → 发起合并请求
        2. 期望结果：能正常完成合并
        3. 实际结果：报错，无提示
        4. 最好附上截图和错误日志
    validations:
      required: true

  - type: textarea
    id: support-info
    attributes:
      label: 环境信息
      description: MergeBeacon 版本、操作系统、Git 平台（GitHub/GitLab/Gitee）等。
      placeholder: |
        MergeBeacon 版本：v0.1.0
        操作系统：macOS 14.5
        系统架构：aarch64
        Git 平台：GitHub
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 优先级（是否紧急）
      description: 紧急 = 希望下个版本优先修。维护者可根据实际情况调整。
      options:
        - "🔴 P0 紧急 · 下个版本必须修"
        - "🟠 P1 重要 · 尽快处理"
        - "🟡 P2 普通 · 按排期处理"
        - "🟢 P3 低优 · 有空再修"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 截图、日志、特殊环境等。
