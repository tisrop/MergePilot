<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="MergeBeacon">
  <defs>
    <linearGradient id="bg" x1="72" y1="46" x2="445" y2="468" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#182B4D"/>
      <stop offset="0.58" stop-color="#101D36"/>
      <stop offset="1" stop-color="#243D78"/>
    </linearGradient>
    <linearGradient id="mark" x1="116" y1="126" x2="402" y2="402" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8DF4E3"/>
      <stop offset="0.52" stop-color="#55E0CC"/>
      <stop offset="1" stop-color="#7187FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#55E0CC" stop-opacity="0.27"/>
      <stop offset="1" stop-color="#55E0CC" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="170%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020817" flood-opacity="0.40"/>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <path d="M136 38h240c56 0 98 35 98 90" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.10"/>
  <circle cx="246" cy="270" r="174" fill="url(#glow)"/>

  <!-- The M remains readable before the beacon detail is noticed. -->
  <path d="M132 372V162l124 140 124-140v210" fill="none" stroke="url(#mark)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- A smaller merge point leaves the M silhouette intact. -->
  <circle cx="256" cy="302" r="27" fill="url(#mark)" filter="url(#shadow)"/>
  <circle cx="256" cy="302" r="8" fill="#F1FFFC" opacity="0.96"/>

  <!-- A narrower, shorter beam reads as scanning light rather than an arrow. -->
  <path d="M275 284 410 144 292 311Z" fill="url(#mark)" opacity="0.56"/>
  <path d="M280 281 401 151" fill="none" stroke="#B9FFF3" stroke-width="11" stroke-linecap="round" opacity="0.82" filter="url(#shadow)"/>
</svg>
