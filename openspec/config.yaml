schema: spec-driven

context: |
  # MergePilot — 跨平台代码合并工具

  ## 产品定位
  MergePilot 是一款桌面端代码合并工具，通过 Tauri v2 构建。
  用户可以浏览 GitHub/GitLab/Gitee 上的 PR/MR，结合 AI 进行代码评审与合并辅助。

  ## 技术栈
  - 前端: Vue 3 + TypeScript + Pinia + Vue Router + Vite
  - 后端: Rust + Tauri v2 + reqwest + async-trait + tokio
  - 安全: AES-256-GCM (aes-gcm) + SHA256 (sha2) 加密存储 Token
  - AI: OpenAI-compatible API（可接入任何兼容端点，默认 gpt-4o）
  - CSS: 手写 CSS 变量（无 UI 框架）
  - 构建: macOS .app / Windows .msi / Linux .deb

  ## 项目结构

  ```
  MergePilot/
  ├── src/                      # Vue 3 前端
  │   ├── api/index.ts          # Tauri IPC 封装（invoke 调用）
  │   ├── types/index.ts        # TypeScript 类型定义
  │   ├── router/index.ts       # 路由（7 条）
  │   ├── stores/               # Pinia 状态管理
  │   │   ├── useAuthStore.ts   # 平台认证状态（支持多平台独立登录）
  │   │   ├── usePrStore.ts     # PR 列表/详情/Diff
  │   │   └── useRepoStore.ts   # 仓库列表 + Fork 上下文
  │   ├── pages/                # 页面组件（6 个）
  │   └── components/           # 功能组件（ai/diff/issue/layout/pr/review）
  │
  └── src-tauri/                # Rust 后端
      ├── src/
      │   ├── lib.rs            # Tauri Builder（注册 20 个 IPC 命令）
      │   ├── state.rs          # AppState（HttpClient + TokenVault + AiConfigManager）
      │   ├── error.rs          # AppError 枚举
      │   ├── models.rs         # 数据模型（User/PR/Review/Issue/AI）
      │   ├── crypto.rs         # AES-256-GCM 加密（密钥=应用密钥+OS用户名）
      │   ├── vault.rs          # Token 存储（~/.mergepilot/config.json）
      │   ├── http_client.rs    # reqwest 客户端封装
      │   ├── platform/         # Git 平台抽象层
      │   │   ├── mod.rs        # GitPlatform trait（统一接口）
      │   │   ├── github.rs     # GitHub API v3 适配器
      │   │   ├── gitlab.rs     # GitLab API v4 适配器
      │   │   └── gitee.rs      # Gitee API v5 适配器
      │   ├── ai/               # AI 评审子系统
      │   │   ├── config.rs     # AI 配置持久化（含加密密钥管理）
      │   │   ├── client.rs     # OpenAI-compatible 客户端（同步+流式）
      │   │   └── prompt.rs     # 评审提示词模板（中文）
      │   └── commands/         # Tauri IPC 命令（5 个模块）
      │       ├── auth.rs       # 登录/登出/检查/仓库列表
      │       ├── pr.rs         # PR 列表/详情/Diff
      │       ├── review.rs     # 评审提交/列表/评论
      │       ├── issue.rs      # Issue 列表/创建
      │       └── ai.rs         # AI 配置/评审（含 streaming 事件推送）
      └── tauri.conf.json       # Tauri 配置

  ## 架构要点

  ### 平台抽象（GitPlatform trait）
  三个 adapter 共享同一接口，添加新平台只需实现 trait。
  GitHub 最完整（~500 行），GitLab/Gitee 部分功能待补（行内评论）。
  支持 fork 仓库的 upstream/fork 切换查看。

  ### AI 评审
  - 支持同步（`ai_review`）和流式（`ai_review_stream`）两种模式
  - 流式模式: tokio::spawn 后台任务 → SSE 解析 → Tauri event 推送到前端
  - 焦点分类: All / Security / Performance / Logic / CodeStyle
  - 评审结果解析: 从 markdown code block 中提取 JSON（兼容模型输出格式）
  - 自定义系统提示词（覆盖默认提示词）

  ### 安全设计
  - Token 存储: AES-256-GCM 加密后存 ~/.mergepilot/config.json
  - 加密密钥: SHA256(固定应用密钥 + OS 用户名) → 32 字节 AES 密钥
  - 前端永不收到明文 API Key（仅后端持有解密能力）

  ### 数据流
  Vue 组件 → Pinia Store (api/index.ts) → invoke("command_name") → Rust Tauri Command → GitPlatform trait 实现 → HTTP API → 各平台

  ## 已知不足（TODO）
  1. GitLab/Gitee 行内评论未实现（create_pr_comment / list_pr_comments 为空）
  2. 分页 total_count 多处为 0，精度有限
  3. 无结构化日志，仅用 eprintln!（建议引入 tracing）
  4. 测试覆盖低（仅 GitHub adapter 有 wiremock 测试）
  5. 前端手写 CSS，无组件库
  6. AI 提示词仅中文
  7. AppError → String 转换丢失错误类型信息
  8. dead_code: GitLabAdapter::auth_header() 未使用

  ## 项目阶段
  MVP / early stage — 核心功能完整，细节待打磨。
